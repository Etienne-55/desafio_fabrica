services:
  backend:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./nextjs_app
      dockerfile: Dockerfile
    # ports:
    #   - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
